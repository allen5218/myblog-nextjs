# Vercel 的 build 機器沒有 HarfBuzz,check:og-font 在那裡會跳過字符檢查
# (scripts/og-font-check-policy.mjs,以 VERCEL=1 判斷)。若新文章沒經本機
# build 就直接 push,子集外的字符會讓 OG 卡片默默出現豆腐字。這個 workflow
# 在 push/PR 時於裝得起 HarfBuzz 的 runner 上補跑同一道檢查。
#
# 故意不用 paths 過濾:這是 main 分支保護的必過 status check 之一,而 GitHub
# 對「必過檢查」的語意是「等到它回報結果為止」——有條件跳過的 workflow 在
# 條件不符時完全不會觸發、永遠不會回報狀態,PR 會被永久卡在 pending。要嘛
# 每次都跑,要嘛就不能設為必過,兩者只能選一個。
name: OG font check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: yarn
      - name: Install HarfBuzz CLI
        run: sudo apt-get update && sudo apt-get install -y libharfbuzz-bin
      - run: yarn
      - run: yarn check:og-font
