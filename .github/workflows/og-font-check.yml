# Vercel 的 build 機器沒有 HarfBuzz,check:og-font 在那裡會跳過字符檢查
# (scripts/og-font-check-policy.mjs,以 VERCEL=1 判斷)。若新文章沒經本機
# build 就直接 push,子集外的字符會讓 OG 卡片默默出現豆腐字。網站 Chiron
# committed WOFF2 也需要 woff2/HarfBuzz 才能做完整 cmap、axis、glyph 與歷史
# assignment 檢查。這個 workflow 在 push/PR 時於裝得起兩組工具的 runner 上補齊。
#
# 故意不用 paths 過濾:這是 main 分支保護的必過 status check 之一,而 GitHub
# 對「必過檢查」的語意是「等到它回報結果為止」——有條件跳過的 workflow 在
# 條件不符時完全不會觸發、永遠不會回報狀態,PR 會被永久卡在 pending。要嘛
# 每次都跑,要嘛就不能設為必過,兩者只能選一個。
name: OG font check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
      - name: Install font tooling
        run: sudo apt-get update && sudo apt-get install -y libharfbuzz-bin woff2
      - run: yarn
      - run: yarn check:og-font
      # The site-font checker derives its exact homepage/article budget models from
      # Contentlayer output. A clean Actions checkout does not contain that output.
      - name: Generate Contentlayer models
        run: yarn contentlayer2 build
      - name: Extract base Chiron assignments
        id: chiron-base
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin main
          base="$RUNNER_TEMP/chiron-supplemental-assignments.base.json"
          if git cat-file -e origin/main:font-data/chiron/supplemental-assignments.json; then
            git show origin/main:font-data/chiron/supplemental-assignments.json > "$base"
            echo "path=$base" >> "$GITHUB_OUTPUT"
          else
            # Initial rollout: main does not have an assignment history yet.
            echo "path=" >> "$GITHUB_OUTPUT"
          fi
      - name: Check Chiron site font
        shell: bash
        env:
          BASE_ASSIGNMENTS: ${{ steps.chiron-base.outputs.path }}
        run: |
          if [[ -n "$BASE_ASSIGNMENTS" ]]; then
            yarn check:site-font --full "--base-assignments=$BASE_ASSIGNMENTS"
          else
            yarn check:site-font --full
          fi
