# PR 合併前的必過檢查(見 branch protection)。og-font-check.yml 獨立成另一個
# workflow 是因為它只在動到內容/字體時才需要跑;這裡跑的是每次 push/PR 都該過的
# 基本品質關卡:lint、型別、單元測試。
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: yarn
      - run: yarn
      # app/、layouts/ 有多處 import 'contentlayer/generated' — 這個模組由
      # contentlayer2 CLI 產生(.contentlayer/generated,gitignore),乾淨 checkout
      # 沒有這個目錄,tsc 會直接報 TS2307 找不到模組。
      - name: Generate contentlayer types
        run: yarn contentlayer2 build
      # CI 要能真的失敗,不用 package.json 裡帶 --fix 的 yarn lint(那是本機用的,
      # 會默默改完就過)
      - name: Lint
        run: yarn eslint app components lib layouts scripts
      - name: Typecheck
        run: yarn tsc --noEmit
      - name: Unit tests
        run: yarn test:unit
