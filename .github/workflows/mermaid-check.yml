# `yarn mermaid:render --check` 是純結構比對:確認每個 mermaid fence 的內容 hash
# 都有對應的 committed SVG、且沒有孤兒檔。它刻意「不」重新渲染 —— mermaid 在不同
# 平台(macOS 作者 vs Linux runner)的文字量測不同,byte 比對會跨平台永遠失敗;
# hash 只由內容決定,跨平台一致。因此這個 job 不需要 Chromium,也很快。
# 它刻意不是必過檢查(job 名 `mermaid`,不在 branch protection 的 required
# contexts `ci`/`check` 之列),只警告不擋合併:提醒作者「改了圖忘了 render+commit」。
name: mermaid-check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
      - run: yarn
      - name: Check Mermaid SVG cache matches content
        run: yarn mermaid:render --check
