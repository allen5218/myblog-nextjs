# 自架 Renovate(不裝 GitHub App,只用這個 repo 的 Actions + 內建 GITHUB_TOKEN)。
# 範圍限定在 renovate.json 的 enabledManagers: ["github-actions"] —
# 只偵測 .github/workflows/*.yml 裡釘死的 action 版本(如 actions/checkout@v4),
# 有新版就自動開 PR,不動 npm/yarn 依賴。
# 需要 repo Settings → Actions → General →
# 「Allow GitHub Actions to create and approve pull requests」打開,
# GITHUB_TOKEN 才有權限開 PR。
name: Renovate

on:
  schedule:
    - cron: '0 4 * * 1' # 每週一 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: renovate.json
          token: '${{ secrets.GITHUB_TOKEN }}'
