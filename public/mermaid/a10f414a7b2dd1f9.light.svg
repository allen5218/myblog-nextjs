<svg height="450" width="654.734375" id="mmd-3-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654.734375 450"  role="graphics-document document" aria-roledescription="pie"><style>#mmd-3-light{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#1f2937;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mmd-3-light .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mmd-3-light .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mmd-3-light .error-icon{fill:#f9fafb;}#mmd-3-light .error-text{fill:#060504;stroke:#060504;}#mmd-3-light .edge-thickness-normal{stroke-width:1px;}#mmd-3-light .edge-thickness-thick{stroke-width:3.5px;}#mmd-3-light .edge-pattern-solid{stroke-dasharray:0;}#mmd-3-light .edge-thickness-invisible{stroke-width:0;fill:none;}#mmd-3-light .edge-pattern-dashed{stroke-dasharray:3;}#mmd-3-light .edge-pattern-dotted{stroke-dasharray:2;}#mmd-3-light .marker{fill:#0085a1;stroke:#0085a1;}#mmd-3-light .marker.cross{stroke:#0085a1;}#mmd-3-light svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#mmd-3-light p{margin:0;}#mmd-3-light .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#mmd-3-light .pieCircle.highlighted{scale:1.05;opacity:1;}#mmd-3-light .pieCircle.highlightedOnHover:hover{transition-duration:250ms;scale:1.05;opacity:1;}#mmd-3-light .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#mmd-3-light .pieTitleText{text-anchor:middle;font-size:25px;fill:#1f2937;font-family:"trebuchet ms",verdana,arial,sans-serif;}#mmd-3-light .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#1f2937;font-size:17px;}#mmd-3-light .legend text{fill:#1f2937;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#mmd-3-light .node .neo-node{stroke:#4db8d1;}#mmd-3-light [data-look="neo