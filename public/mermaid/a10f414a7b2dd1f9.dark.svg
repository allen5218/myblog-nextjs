<svg height="450" width="654.734375" id="mmd-3-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654.734375 450"  role="graphics-document document" aria-roledescription="pie"><style>#mmd-3-dark{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#e5e7eb;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mmd-3-dark .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mmd-3-dark .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mmd-3-dark .error-icon{fill:#0b1220;}#mmd-3-dark .error-text{fill:#f4eddf;stroke:#f4eddf;}#mmd-3-dark .edge-thickness-normal{stroke-width:1px;}#mmd-3-dark .edge-thickness-thick{stroke-width:3.5px;}#mmd-3-dark .edge-pattern-solid{stroke-dasharray:0;}#mmd-3-dark .edge-thickness-invisible{stroke-width:0;fill:none;}#mmd-3-dark .edge-pattern-dashed{stroke-dasharray:3;}#mmd-3-dark .edge-pattern-dotted{stroke-dasharray:2;}#mmd-3-dark .marker{fill:#4db8d1;stroke:#4db8d1;}#mmd-3-dark .marker.cross{stroke:#4db8d1;}#mmd-3-dark svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#mmd-3-dark p{margin:0;}#mmd-3-dark .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#mmd-3-dark .pieCircle.highlighted{scale:1.05;opacity:1;}#mmd-3-dark .pieCircle.highlightedOnHover:hover{transition-duration:250ms;scale:1.05;opacity:1;}#mmd-3-dark .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#mmd-3-dark .pieTitleText{text-anchor:middle;font-size:25px;fill:#e5e7eb;font-family:"trebuchet ms",verdana,arial,sans-serif;}#mmd-3-dark .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#e5e7eb;font-size:17px;}#mmd-3-dark .legend text{fill:#e5e7eb;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#mmd-3-dark .node .neo-node{stroke:#4db8d1;}#mmd-3-dark [data-look="neo"].node rect,#mmd-3-dark 